<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#191414" />
  <title>Highwayman Button</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icon-192.svg" type="image/svg+xml" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #3d3324, #151412 58%, #050505);
      color: #fff7e8;
    }
    main {
      width: min(420px, 100%);
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 12vw, 4.4rem);
      line-height: .9;
      letter-spacing: -.07em;
    }
    p { margin: 0 0 24px; color: #d4c8b3; font-size: 1.05rem; }
    button {
      width: 100%;
      border: 0;
      border-radius: 30px;
      padding: 24px;
      font: 900 1.25rem system-ui, sans-serif;
      color: #06110a;
      background: #1DB954;
      box-shadow: 0 18px 46px rgba(29,185,84,.28);
      cursor: pointer;
    }
    button:active { transform: translateY(1px); }
    .hint { margin-top: 18px; color: #a99f8c; font-size: .92rem; line-height: 1.4; }
  </style>
</head>
<body>
  <main>
    <h1>Highwayman</h1>
    <p>The Highwaymen · Spotify</p>
    <button id="play" autofocus>Play album</button>
    <div class="hint" id="hint">Add this page to your home screen. It will not open Spotify until you press the button.</div>
  </main>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    const albumUrl = 'https://open.spotify.com/album/6rFM5jHaGzwut3hGbG9pGU';
    const intentUrl = 'intent://open.spotify.com/album/6rFM5jHaGzwut3hGbG9pGU#Intent;scheme=https;package=com.spotify.music;S.browser_fallback_url=' + encodeURIComponent(albumUrl) + ';end';

    function playHighwayman() {
      document.getElementById('hint').textContent = 'Opening Spotify…';
      window.location.href = intentUrl;
      setTimeout(() => { window.location.href = albumUrl; }, 1500);
    }

    document.getElementById('play').addEventListener('click', playHighwayman);
  </script>
</body>
</html>
